services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: story
      POSTGRES_USER: story
      POSTGRES_PASSWORD: ${STORY_DATABASE_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U story"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
