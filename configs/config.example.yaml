app:
  name: story
  environment: development
  log_level: debug

server:
  host: 0.0.0.0
  port: 8080
  base_url: http://localhost:8080

database:
  host: localhost
  port: 5432
  name: story
  user: story
  password: "${STORY_DATABASE_PASSWORD}"
  ssl_mode: disable
  max_open_conns: 25
  max_idle_conns: 5

auth:
  jwt_secret: "${STORY_AUTH_JWT_SECRET}"
  access_token_ttl: 15m
  refresh_token_ttl: 720h
  password_reset_ttl: 1h

llm:
  provider: openai  # openai, gemini, ollama, anthropic
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: gpt-4
  gemini:
    api_key: "${GEMINI_API_KEY}"
    model: gemini-pro
  ollama:
    base_url: http://localhost:11434
    model: llama2
  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    model: claude-3-opus-20240229

smtp:
  host: localhost
  port: 1025
  username: ""
  password: "${STORY_SMTP_PASSWORD}"
  from: story@example.com
