# Story Configuration — Development Defaults
# Copy this file and adjust for your environment.
# Secrets should be set via environment variables, never committed.

app:
  name: story
  environment: development
  log_level: debug

server:
  host: 0.0.0.0
  port: 8080

database:
  host: localhost
  port: 5432
  name: story
  user: story
  ssl_mode: disable
  max_open_conns: 25
  max_idle_conns: 5

auth:
  access_token_ttl: 15m
  refresh_token_ttl: 720h
  password_reset_ttl: 1h
