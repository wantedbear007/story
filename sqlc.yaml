# sqlc configuration
# Run `sqlc generate` to produce type-safe Go code from SQL queries.
#
# Prerequisites:
#   brew install sqlc
#
# Usage:
#   1. Write SQL queries in internal/infrastructure/repository/queries/
#   2. Run: sqlc generate
#   3. Generated code lands in internal/infrastructure/repository/sqlcgen/

version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infrastructure/repository/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/infrastructure/repository/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_prepared_queries: false
        emit_exact_table_names: false
        overrides:
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
