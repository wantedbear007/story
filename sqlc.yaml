version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infrastructure/repository/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/infrastructure/repository/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_prepared_queries: false
        emit_exact_table_names: false
