<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <nav id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">S</div>
      <span class="brand-text">Story</span>
    </div>
    <div class="sidebar-links">
      <a href="#/captures" class="sidebar-link" data-route>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Captures
      </a>
      <a href="#/created" class="sidebar-link" data-route>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>
        Created
      </a>
      <a href="#/pipeline" class="sidebar-link" data-route>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Pipeline
      </a>
    </div>
    <div class="sidebar-footer">
      <a href="#" id="logout-link" class="sidebar-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>
  </nav>

  <main id="app">
    <div id="login-view">
      <div class="login-card">
        <div class="login-logo">S</div>
        <h1>Story</h1>
        <p class="login-desc">Connect to your content pipeline</p>
        <input type="text" id="code-input" placeholder="Login code" autocomplete="off">
        <button id="login-btn" class="btn btn-primary" style="width:100%">Connect</button>
        <p class="login-hint">Run <code>story web</code> and open the link in your terminal</p>
      </div>
    </div>
    <div id="main-view" style="display:none">
      <div class="page-header">
        <h1 id="page-title">Captures</h1>
        <div id="page-actions"></div>
      </div>
      <div id="page-content"></div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/pages/captures.js"></script>
  <script src="/js/pages/created.js"></script>
  <script src="/js/pages/pipeline.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
