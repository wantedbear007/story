<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Dashboard</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <nav id="nav-bar">
    <div class="nav-brand">Story</div>
    <div class="nav-links">
      <a href="#/drafts" class="nav-link" data-route>Drafts</a>
      <a href="#/resources" class="nav-link" data-route>Resources</a>
      <a href="#" id="logout-link" class="nav-link">Logout</a>
    </div>
  </nav>

  <main id="app">
    <div id="login-view">
      <div class="login-card">
        <h1>Story Dashboard</h1>
        <p class="login-desc">Enter your login code to connect.</p>
        <input type="text" id="code-input" placeholder="Paste the code from the URL" autocomplete="off">
        <button id="login-btn" class="btn btn-primary">Connect</button>
        <p class="login-hint">Run <code>story web</code> and open the URL in the terminal.</p>
      </div>
    </div>
    <div id="main-view" style="display:none">
      <div id="page-content"></div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/pages/drafts.js"></script>
  <script src="/js/pages/edit.js"></script>
  <script src="/js/pages/resources.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
